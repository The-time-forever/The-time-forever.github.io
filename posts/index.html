---
layout: null
---
<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章列表 | The Time Forever</title>
  <style>
    /* 全局重置与字体颜色 */
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: #ffffff;
      /* 全局白色字体 */
      overflow-x: hidden;
      background-color: #000000;
      /* 确保背景黑 */
    }

    /* Canvas 放到页面最底层 */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      display: block;
      background: #000000;
      pointer-events: none;
    }

    /* 返回首页按钮 */
    .home-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 8px 16px;
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      backdrop-filter: blur(4px);
      transition: all 0.3s ease;
      z-index: 100;
      font-size: 0.9rem;
    }

    .home-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-color: #fff;
    }

    /* 毛玻璃容器 (Glassmorphism) */
    .glass-container {
      max-width: 800px;
      margin: 80px auto 40px;
      /* 上边距留给返回按钮 */
      padding: 40px;
      background: rgba(20, 20, 30, 0.4);
      /* 更通透的深色背景 */
      backdrop-filter: blur(20px);
      /* 高强度背景模糊 */
      -webkit-backdrop-filter: blur(20px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      /* 极细的亮色边框 */
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      /* 深度感阴影 */
    }

    /* 标题样式 */
    .glass-container h1 {
      margin-top: 0;
      font-weight: 300;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 16px;
      margin-bottom: 24px;
      text-align: center;
      color: #00f2ff;
      text-shadow: 0 0 5px rgba(0, 242, 255, 0.7), 0 0 15px rgba(0, 242, 255, 0.5);
      letter-spacing: 2px;
    }

    /* 全站访问统计 */
    .site-stats {
      text-align: center;
      color: #888;
      font-size: 0.85em;
      margin: -12px 0 24px;
    }

    .site-stats span {
      color: #00f2ff;
      opacity: 0.85;
    }

    /* 访问统计图标：跟随文字颜色，不用彩色 emoji 避免突兀 */
    .stat-icon {
      width: 12px;
      height: 12px;
      vertical-align: -1px;
      margin: 0 1px;
      color: #00f2ff;
    }

    /* 列表样式 */
    .glass-container ul {
      list-style: none;
      padding: 0;
    }

    .glass-container li {
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      gap: 12px;
      padding-bottom: 8px;
    }

    .glass-container li a {
      flex: 1;
      min-width: 0;
      line-height: 1.6;
    }

    .glass-container .post-date {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.6);
      margin-left: 16px;
      white-space: nowrap;
      font-family: monospace;
    }

    /* 链接样式 */
    .glass-container a {
      color: #00ffff;
      /* 亮青色 */
      text-decoration: none;
      transition: color 0.2s;
    }

    .glass-container a:hover {
      color: #fff;
      text-decoration: underline;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.6);
    }

    /* 响应式调整 */
    @media (max-width: 600px) {
      .glass-container {
        margin: 72px 12px 20px;
        padding: 20px;
      }

      .home-btn {
        top: 16px;
        left: 16px;
        padding: 8px 14px;
      }

      .glass-container h1 {
        font-size: 1.8rem;
        letter-spacing: 1px;
      }

      .glass-container li {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
        padding-bottom: 12px;
      }

      .glass-container .post-date {
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Canvas 背景：不影响可访问性 -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- 返回首页按钮 -->
  <a href="/" class="home-btn">← 返回首页</a>

  <div class="glass-container">
    <h1>文章列表</h1>
    <p class="site-stats" id="busuanzi_container_site_pv" style="display:none">
      <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>
      全站访问 <span id="busuanzi_value_site_pv"></span> 次
      ·
      <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      访客 <span id="busuanzi_value_site_uv"></span> 人
    </p>

    <ul>
      {% for post in site.posts %}
      <li>
        {% if post.redirect_to %}
        <a href="{{ post.redirect_to }}" target="_blank">{{ post.title }}</a>
        {% else %}
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        {% endif %}
        <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
      </li>
      {% endfor %}
    </ul>

    <p style="font-size:0.9rem;color:#bbb;margin-top:2rem;">提示：鼠标移动会产生拖尾并影响周围粒子；按住 <strong>Alt</strong>
      可切换吸引（Alt）/排斥（默认）效果。</p>
  </div>

  <script src="/assets/js/space-particles.js" defer></script>
  <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>

</html>
